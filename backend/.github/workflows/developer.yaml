name: developer

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  deploy:
    runs-on: [dev228]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: run install, build and test
        run: |
          cd /opt/apps
          rm -rf consulta-de-processos
          git clone --branch dev --single-branch git@github.com:PGM-CTEC/consulta-de-processos.git
          cd consulta-de-processos          
          rm .env          
          cp .env.dev .env
          chmod +x ./build.sh
          ./build.sh

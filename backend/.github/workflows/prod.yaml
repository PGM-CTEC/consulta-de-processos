name: prd

on:
  push:
    branches: ["desmembramento_backend"]
  pull_request:
    branches: ["desmembramento_backend"]

jobs:
  deploy:
    runs-on: [production226]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Get current user
        run: whoami
      - name: run install, build and test
        run: |
          cd /opt/apps
          rm -rf consulta-de-processos
          git clone --branch main --single-branch git@github.com:PGM-CTEC/consulta-de-processos.git
          cd consulta-de-processos
          rm Dockerfile
          rm .env
          cp DockerfilePRD Dockerfile
          cp .env.production .env
          chmod +x ./build.sh
          ./build.sh
